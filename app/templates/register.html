<!-- Allowing professors to register and create a new account -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4 p-md-5">
                    <h3 class="card-title text-center mb-4">Create Account</h3>
                    
                    <!-- Flash popups like "try again" or "invalid password" -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <!-- Inputting professor name to be displayed to students -->
                    <form method="POST" action="{{ url_for('main.register') }}">
                        <div class="mb-3">
                            <label class="form-label text-muted fw-semibold">Display Name</label>
                            <input type="text" name="name" class="form-control" required placeholder="Your Name">
                            <div class="form-text">This will be used to generate your custom student link.</div>
                        </div>
                        <!-- Inputting email address for login-->
                        <div class="mb-3">
                            <label class="form-label text-muted fw-semibold">ONU Email Address</label>
                            <input type="email" name="email" class="form-control" required placeholder="Email">
                        </div>
                        <!-- Input password -->
                        <div class="mb-4">
                            <label class="form-label text-muted fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control" required minlength="6" placeholder="Password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign Up</button>
                    </form>
                    
                    <!-- Login if you already have an account -->
                    <div class="text-center mt-4">
                        <span class="text-muted">Already have an account?</span> 
                        <a href="{{ url_for('main.login') }}" class="text-decoration-none fw-semibold">Log In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
