# Pytest Configuration File
# Acts as the central configuration hub for the automated test runner.

[pytest]
# Warning Filter Configuration
# Third-party dependencies (like Flask or its underlying WSGI libraries) frequently 
# trigger DeprecationWarnings as their internal APIs evolve over time. 
# Suppressing these warnings globally ensures the terminal output remains clean, 
# allowing developers to focus strictly on the pass/fail state of the core 
# algorithmic assertions without suffering from "warning fatigue" in the console.
filterwarnings =
    ignore::DeprecationWarning